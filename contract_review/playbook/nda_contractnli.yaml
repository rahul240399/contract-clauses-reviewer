id: nda_contractnli
name: NDA review playbook (Disclosing Party stance)
perspective: disclosing_party
description: >-
  Seventeen NDA review rules. Statements are the ContractNLI hypotheses (kept
  verbatim so verdicts align with the evaluation oracle). expected_disposition
  is the verdict a reviewer representing the DISCLOSING PARTY wants to see; any
  actual verdict that differs is a deviation. This is a swappable artifact: edit
  the dispositions, or supply a different file, to review from another stance.

# expected_disposition is one of: Entailment | Contradiction | NotMentioned
rules:
  - id: nda-1
    name: Explicit identification
    statement: All Confidential Information shall be expressly identified by the Disclosing Party.
    expected_disposition: NotMentioned
    rationale: >-
      An express-identification requirement limits protection to only marked
      information; the discloser prefers no such precondition. (Negotiable.)

  - id: nda-2
    name: Non-inclusion of non-technical information
    statement: Confidential Information shall only include technical information.
    expected_disposition: NotMentioned
    rationale: >-
      Restricting Confidential Information to technical matter leaves business
      and financial information unprotected; undesirable for the discloser.

  - id: nda-3
    name: Inclusion of verbally conveyed information
    statement: Confidential Information may include verbally conveyed information.
    expected_disposition: Entailment
    rationale: >-
      Covering verbally conveyed information broadens protection in the
      discloser's favor.

  - id: nda-4
    name: Limited use
    statement: Receiving Party shall not use any Confidential Information for any purpose other than the purposes stated in Agreement.
    expected_disposition: Entailment
    rationale: >-
      A use restriction confines the receiver to the agreed purpose; a core
      protection for the discloser.

  - id: nda-5
    name: Sharing with employees
    statement: Receiving Party may share some Confidential Information with some of Receiving Party's employees.
    expected_disposition: Entailment
    rationale: >-
      Need-to-know sharing with employees is standard and acceptable, typically
      with confidentiality flow-down. (Negotiable.)

  - id: nda-7
    name: Sharing with third-parties
    statement: Receiving Party may share some Confidential Information with some third-parties (including consultants, agents and professional advisors).
    expected_disposition: NotMentioned
    rationale: >-
      Broad third-party sharing raises leakage risk; the discloser prefers it
      absent or tightly controlled. (Negotiable.)

  - id: nda-8
    name: Notice on compelled disclosure
    statement: Receiving Party shall notify Disclosing Party in case Receiving Party is required by law, regulation or judicial process to disclose any Confidential Information.
    expected_disposition: Entailment
    rationale: >-
      Advance notice on compelled disclosure lets the discloser seek a
      protective order before information is released.

  - id: nda-10
    name: Confidentiality of Agreement
    statement: Receiving Party shall not disclose the fact that Agreement was agreed or negotiated.
    expected_disposition: Entailment
    rationale: >-
      Keeping the existence and terms of the agreement confidential protects the
      discloser's commercial interests.

  - id: nda-11
    name: No reverse engineering
    statement: Receiving Party shall not reverse engineer any objects which embody Disclosing Party's Confidential Information.
    expected_disposition: Entailment
    rationale: >-
      A reverse-engineering ban protects embodied intellectual property; clearly
      discloser-favorable.

  - id: nda-12
    name: Permissible development of similar information
    statement: Receiving Party may independently develop information similar to Confidential Information.
    expected_disposition: NotMentioned
    rationale: >-
      An independent-development carve-out weakens protection; the discloser
      prefers it absent. (Negotiable; a common and legitimate receiver ask.)

  - id: nda-13
    name: Permissible acquirement of similar information
    statement: Receiving Party may acquire information similar to Confidential Information from a third party.
    expected_disposition: NotMentioned
    rationale: >-
      A third-party-acquisition carve-out weakens protection; the discloser
      prefers it absent. (Negotiable.)

  - id: nda-15
    name: No licensing
    statement: Agreement shall not grant Receiving Party any right to Confidential Information.
    expected_disposition: Entailment
    rationale: >-
      Confirming that no license or right passes to the receiver protects the
      discloser's intellectual property.

  - id: nda-16
    name: Return of confidential information
    statement: Receiving Party shall destroy or return some Confidential Information upon the termination of Agreement.
    expected_disposition: Entailment
    rationale: >-
      Return or destruction on termination limits lingering exposure;
      discloser-favorable.

  - id: nda-17
    name: Permissible copy
    statement: Receiving Party may create a copy of some Confidential Information in some circumstances.
    expected_disposition: NotMentioned
    rationale: >-
      Permitting copies increases dispersion of Confidential Information; the
      discloser prefers restriction. (Negotiable.)

  - id: nda-18
    name: No solicitation
    statement: Receiving Party shall not solicit some of Disclosing Party's representatives.
    expected_disposition: Entailment
    rationale: >-
      A non-solicitation obligation favors the discloser.

  - id: nda-19
    name: Survival of obligations
    statement: Some obligations of Agreement may survive termination of Agreement.
    expected_disposition: Entailment
    rationale: >-
      Survival of obligations keeps confidentiality protections in force after
      termination; discloser-favorable.

  - id: nda-20
    name: Permissible post-agreement possession
    statement: Receiving Party may retain some Confidential Information even after the return or destruction of Confidential Information.
    expected_disposition: NotMentioned
    rationale: >-
      Post-return retention rights leave Confidential Information in the
      receiver's hands; the discloser prefers no retention. (Negotiable.)
